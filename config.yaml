# Data paths
data:
  raw_path: data/raw/spam.csv
  train_path: data/processed/train.csv
  test_path: data/processed/test.csv
  val_path: data/processed/val.csv

# Model paths
models:
  classifier_path: models/spam_classifier.pkl
  vectorizer_path: models/tfidf_vectorizer.pkl

# Preprocessing
preprocessing:
  max_features: 3000
  test_size: 0.2
  random_state: 42
  language: english

# Model parameters
model:
  logistic_regression:
    max_iter: 1000
    random_state: 42
  naive_bayes:
    alpha: 1.0
  random_forest:
    n_estimators: 100
    random_state: 42

# API
api:
  host: 127.0.0.1
  port: 8000
  